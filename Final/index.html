<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recognition Journey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      font-family: Inter, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Landing ── */
    #landing {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #landing-img {
      max-width: 100vw;
      max-height: 100vh;
      display: block;
      user-select: none;
    }

    #open-journey-overlay {
      position: absolute;
      cursor: pointer;
      background: transparent;
      border: none;
      border-radius: 8px;
      z-index: 10;
      left: 30%;
      top: 40%;
      width: 47%;
      height: 28%;
    }

    /* ── Story Viewer ── */
    #story-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.93);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #story-viewer.active { display: flex; }

    /* Progress segments */
    #progress-bar {
      display: flex;
      gap: 5px;
      margin-bottom: 12px;
    }

    .seg {
      height: 3px;
      width: 36px;
      border-radius: 3px;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: background 0.25s;
    }
    .seg.done   { background: rgba(255,255,255,0.7); }
    .seg.active { background: #fff; }

    /* Story image */
    #story-frame {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #story-img {
      max-height: 78vh;
      max-width: 88vw;
      display: block;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      user-select: none;
      pointer-events: none;
    }

    .tap-zone {
      position: absolute;
      top: 0; height: 100%;
      width: 45%;
      cursor: pointer;
      z-index: 5;
    }
    #tap-prev { left: 0; }
    #tap-next  { right: 0; }

    /* Counter */
    #slide-counter {
      margin-top: 10px;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      letter-spacing: 0.4px;
    }

    /* ── Download CTA — appears on last slide ── */
    #download-cta {
      display: none;
      margin-top: 16px;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #download-cta.visible { display: flex; }

    #btn-save {
      background: #5B3DF5;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 26px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    #btn-save:hover { background: #4a2fe0; transform: translateY(-1px); }

    #cta-hint {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
    }

    /* Arrow buttons */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      z-index: 200;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.26); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    #btn-prev { left: 14px; }
    #btn-next  { right: 14px; }

    /* Close */
    #btn-close {
      position: fixed;
      top: 14px; right: 18px;
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 50%;
      width: 36px; height: 36px;
      color: #fff; font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      z-index: 200;
    }
    #btn-close:hover { background: rgba(255,255,255,0.26); }

    /* ── Download Panel ── */
    #download-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      z-index: 300;
      overflow-y: auto;   /* plain block scroll — no flex cropping */
    }

    #download-panel.active { display: block; }

    /* inner wrapper centres content and adds padding */
    #panel-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #panel-header {
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
    }

    #panel-header h2 {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    #panel-header p {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
    }

    #slides-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      margin-bottom: 32px;
    }

    .slide-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.2s;
    }

    .slide-card:hover { background: rgba(255,255,255,0.09); }

    /* contain — never crops the image regardless of aspect ratio */
    .slide-thumb {
      width: 100%;
      aspect-ratio: 9/16;
      object-fit: contain;
      background: #111;
      display: block;
    }

    .slide-card-footer {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .slide-label {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-dl-single {
      background: rgba(91, 61, 245, 0.8);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .btn-dl-single:hover { background: #5B3DF5; }
    .btn-dl-single.downloading { opacity: 0.6; cursor: default; }

    #panel-actions {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    #btn-download-all {
      background: #5B3DF5;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 11px 30px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    #btn-download-all:hover { background: #4a2fe0; }
    #btn-download-all:disabled { opacity: 0.5; cursor: default; }

    #btn-panel-close {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 11px 24px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-panel-close:hover { background: rgba(255,255,255,0.16); }
  </style>
</head>
<body>

  <!-- Landing -->
  <div id="landing">
    <img id="landing-img" src="Discovery Point.png" alt="Discovery">
    <button id="open-journey-overlay" aria-label="Open Journey"></button>
  </div>

  <!-- Story Viewer -->
  <div id="story-viewer">
    <div id="progress-bar"></div>
    <div id="story-frame">
      <img id="story-img" src="" alt="Slide">
      <div class="tap-zone" id="tap-prev"></div>
      <div class="tap-zone" id="tap-next"></div>
    </div>
    <div id="slide-counter"></div>

    <!-- Download CTA shown on last slide -->
    <div id="download-cta">
      <button id="btn-save">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Save for Social Sharing
      </button>
      <span id="cta-hint">Download your recognition slides as PNG</span>
    </div>

    <button class="nav-btn" id="btn-prev">&#8592;</button>
    <button class="nav-btn" id="btn-next">&#8594;</button>
    <button id="btn-close">&#10005;</button>
  </div>

  <!-- Download Panel -->
  <div id="download-panel">
    <div id="panel-inner">
    <div id="panel-header">
      <h2>Save for Social Sharing</h2>
      <p>Download individual slides or all at once</p>
    </div>
    <div id="slides-grid"></div>
    <div id="panel-actions">
      <button id="btn-download-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download All
      </button>
      <button id="btn-panel-close">Back to Journey</button>
    </div>
    </div>
  </div>

  <script>
    const slides = [
      { file: "1 Cover.png?v=2",                        label: "Cover" },
      { file: "2 Your Impact.png?v=1",                  label: "Your Impact" },
      { file: "3 Your Recognition Milestones.png?v=2",  label: "Milestones" },
      { file: "Recognitions from People.png?v=1",       label: "Recognitions" },
      { file: "4 Values You Represent.png?v=2",         label: "Values" },
      { file: "5 Badge Cabinet.png?v=1",                label: "Badge Cabinet" },
      { file: "6 Award Cabinet.png?v=1",                label: "Award Cabinet" },
      { file: "7 How You Built Culture.png?v=1",        label: "Culture" },
      { file: "8 End Page.png?v=1",                     label: "End Page" }
    ];

    let current = 0;

    // ── Landing ──
    const overlay = document.getElementById('open-journey-overlay');
    overlay.addEventListener('click', openJourney);

    function openJourney() {
      current = 0;
      buildProgress();
      showSlide(0);
      document.getElementById('story-viewer').classList.add('active');
    }

    function closeJourney() {
      document.getElementById('story-viewer').classList.remove('active');
    }

    document.getElementById('btn-close').addEventListener('click', closeJourney);

    // ── Slide logic ──
    function showSlide(i) {
      current = i;
      document.getElementById('story-img').src = slides[i].file;
      document.getElementById('slide-counter').textContent = (i + 1) + ' / ' + slides.length;
      document.getElementById('btn-prev').disabled = i === 0;
      document.getElementById('btn-next').disabled = i === slides.length - 1;
      updateProgress();

      // Show download CTA only on last slide
      const cta = document.getElementById('download-cta');
      if (i === slides.length - 1) {
        cta.classList.add('visible');
      } else {
        cta.classList.remove('visible');
      }
    }

    document.getElementById('btn-prev').addEventListener('click',  () => { if (current > 0) showSlide(current - 1); });
    document.getElementById('btn-next').addEventListener('click',  () => { if (current < slides.length - 1) showSlide(current + 1); });
    document.getElementById('tap-prev').addEventListener('click',  () => { if (current > 0) showSlide(current - 1); });
    document.getElementById('tap-next').addEventListener('click',  () => { if (current < slides.length - 1) showSlide(current + 1); });

    document.addEventListener('keydown', e => {
      const viewerActive = document.getElementById('story-viewer').classList.contains('active');
      const panelActive  = document.getElementById('download-panel').classList.contains('active');
      if (panelActive && e.key === 'Escape') { closePanel(); return; }
      if (!viewerActive) return;
      if (e.key === 'ArrowRight' && current < slides.length - 1) showSlide(current + 1);
      if (e.key === 'ArrowLeft'  && current > 0)                 showSlide(current - 1);
      if (e.key === 'Escape') closeJourney();
    });

    // ── Progress bar ──
    function buildProgress() {
      const bar = document.getElementById('progress-bar');
      bar.innerHTML = '';
      slides.forEach((_, i) => {
        const s = document.createElement('div');
        s.className = 'seg';
        s.id = 'seg-' + i;
        s.addEventListener('click', () => showSlide(i));
        bar.appendChild(s);
      });
    }

    function updateProgress() {
      slides.forEach((_, i) => {
        const s = document.getElementById('seg-' + i);
        if (s) s.className = 'seg' + (i < current ? ' done' : i === current ? ' active' : '');
      });
    }

    // ── Download Panel ──
    document.getElementById('btn-save').addEventListener('click', openPanel);
    document.getElementById('btn-panel-close').addEventListener('click', closePanel);

    function openPanel() {
      buildGrid();
      document.getElementById('download-panel').classList.add('active');
    }

    function closePanel() {
      document.getElementById('download-panel').classList.remove('active');
    }

    function buildGrid() {
      const grid = document.getElementById('slides-grid');
      grid.innerHTML = '';
      slides.forEach((slide, i) => {
        const card = document.createElement('div');
        card.className = 'slide-card';

        const thumb = document.createElement('img');
        thumb.className = 'slide-thumb';
        thumb.src = slide.file;
        thumb.alt = slide.label;

        const footer = document.createElement('div');
        footer.className = 'slide-card-footer';

        const label = document.createElement('span');
        label.className = 'slide-label';
        label.textContent = slide.label;

        const btn = document.createElement('button');
        btn.className = 'btn-dl-single';
        btn.textContent = '↓ Save';
        btn.addEventListener('click', () => downloadSlide(slide.file, slide.label, btn));

        footer.appendChild(label);
        footer.appendChild(btn);
        card.appendChild(thumb);
        card.appendChild(footer);
        grid.appendChild(card);
      });
    }

    async function downloadSlide(file, label, btn) {
      if (btn) { btn.textContent = '…'; btn.classList.add('downloading'); }
      try {
        const res   = await fetch(file);
        const blob  = await res.blob();
        const url   = URL.createObjectURL(blob);
        const a     = document.createElement('a');
        a.href      = url;
        a.download  = 'Recognition_Journey_' + label.replace(/\s+/g, '_') + '.png';  // ?v=x stripped — fetch uses it, filename doesn't
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        if (btn) { btn.textContent = '✓ Saved'; }
      } catch (err) {
        if (btn) { btn.textContent = '↓ Save'; btn.classList.remove('downloading'); }
      }
    }

    document.getElementById('btn-download-all').addEventListener('click', async () => {
      const btn = document.getElementById('btn-download-all');
      btn.disabled = true;
      btn.textContent = 'Downloading…';
      for (let i = 0; i < slides.length; i++) {
        const cardBtns = document.querySelectorAll('.btn-dl-single');
        await downloadSlide(slides[i].file, slides[i].label, cardBtns[i] || null);
        await new Promise(r => setTimeout(r, 400)); // slight delay between downloads
      }
      btn.textContent = '✓ All Saved!';
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download All';
      }, 3000);
    });
  </script>
</body>
</html>
